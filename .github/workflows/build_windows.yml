name: build_windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows:
    name: build_windows_x64
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: install_dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: restore
        run: dotnet restore src/kudwa_focus/kudwa_focus.csproj

      - name: run_checks
        run: dotnet run --project tests/kudwa_focus_tests/kudwa_focus_tests.csproj --configuration Release

      - name: publish_executable
        run: dotnet publish src/kudwa_focus/kudwa_focus.csproj --configuration Release --runtime win-x64 --self-contained true --output dist

      - name: verify_executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/kudwa_focus.exe")) {
            throw "dist/kudwa_focus.exe was not created"
          }
          Get-Item "dist/kudwa_focus.exe" | Format-List Name, Length, LastWriteTime

      - name: smoke_test_launch
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist/kudwa_focus.exe" -PassThru
          Start-Sleep -Seconds 4
          if ($process.HasExited) {
            throw "KUDWA Focus exited during the launch smoke test with code $($process.ExitCode)"
          }
          $audio_path = Join-Path $env:LOCALAPPDATA "kudwa_focus\audio\v1"
          if (-not (Test-Path (Join-Path $audio_path "gentle_break_loop.wav"))) {
            throw "The embedded gentle audio asset was not extracted"
          }
          if (-not (Test-Path (Join-Path $audio_path "final_minute_crescendo.wav"))) {
            throw "The embedded crescendo audio asset was not extracted"
          }
          Stop-Process -Id $process.Id -Force

      - name: upload_build_artifact
        uses: actions/upload-artifact@v7
        with:
          name: kudwa_focus_windows_x64
          path: dist/kudwa_focus.exe
          if-no-files-found: error

      - name: create_github_release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" "dist/kudwa_focus.exe" --repo "$env:GITHUB_REPOSITORY" --title "KUDWA Focus $env:GITHUB_REF_NAME" --generate-notes
